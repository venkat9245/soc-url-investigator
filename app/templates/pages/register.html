{% extends "layouts/base.html" %}
{% block title %}Register - SOC URL Investigator{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <div class="card border-secondary">
            <div class="card-header text-center">
                <i class="fas fa-user-plus fa-2x text-danger mb-2"></i>
                <h5 class="mb-0">Create Account</h5>
                <small class="text-muted">Register for SOC access</small>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" name="username" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" required minlength="8">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" class="form-control" name="confirm_password" required>
                    </div>
                    <button type="submit" class="btn btn-danger w-100"><i class="fas fa-user-plus"></i> Register</button>
                </form>
            </div>
            <div class="card-footer text-center">
                <small class="text-muted">
                    Already have an account? <a href="{{ url_for('auth.login') }}" class="text-info">Sign in</a>
                </small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
