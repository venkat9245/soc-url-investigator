{% extends "layouts/base.html" %}
{% block title %}Login - SOC URL Investigator{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <div class="card border-secondary">
            <div class="card-header text-center">
                <i class="fas fa-shield-halved fa-2x text-danger mb-2"></i>
                <h5 class="mb-0">SOC URL Investigator</h5>
                <small class="text-muted">Sign in to continue</small>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" name="username" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-danger w-100"><i class="fas fa-sign-in-alt"></i> Sign In</button>
                </form>
            </div>
            <div class="card-footer text-center">
                <small class="text-muted">
                    No account? <a href="{{ url_for('auth.register') }}" class="text-info">Register</a>
                </small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
